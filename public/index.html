<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITStand | Ultimate Deployment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* ===== Theme variables (white theme) ===== */
        :root {
            --bg: #ffffff;
            --card: #f7f8fa;
            --border: #e6e7ea;
            --accent: #0b5fff;
            --text: #0b1220;
            --muted: #6b7280;
            --success: #0b8a3e;
            --danger: #d04545;
            --glass: rgba(255,255,255,0.6);
        }

        /* ===== Base reset ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
            overflow-x: hidden;
        }

        /* ===== Navbar ===== */
        .navbar {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,255,255,0.75));
            backdrop-filter: blur(6px);
            z-index: 100;
        }
        .logo {
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            border: 2px solid var(--text);
            border-radius: 8px;
            position: relative;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(180deg,#fff,#f1f5f9);
        }
        .logo-icon::after {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ===== Container & headings ===== */
        .container { max-width: 900px; margin: 80px auto; padding: 0 20px; text-align: center; }
        h1 {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 40px;
            letter-spacing: -1px;
            color: var(--text);
        }

        /* ===== Input group ===== */
        .input-group { position: relative; margin-bottom: 40px; }
        #repoInput {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 20px 30px;
            border-radius: 100px;
            color: var(--text);
            font-size: 18px;
            outline: none;
            transition: all 0.25s ease;
            text-align: center;
            box-shadow: 0 6px 18px rgba(15,20,30,0.04);
        }
        #repoInput::placeholder { color: var(--muted); }
        #repoInput:focus {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(11,95,255,0.08);
            transform: translateY(-1px);
        }

        /* ===== File browser (light card) ===== */
        .file-browser {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: left;
            display: none;
            animation: fadeInCard 0.35s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(16,24,40,0.04);
        }
        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .browser-header {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg,#ffffff,#fbfdff);
        }
        .file-item {
            padding: 12px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--muted);
            transition: 0.18s ease;
            cursor: default;
            background: transparent;
        }
        .file-item:hover {
            background: linear-gradient(90deg, rgba(11,95,255,0.03), rgba(11,95,255,0.01));
            color: var(--text);
        }
        .file-icon { color: var(--muted); font-size: 14px; }

        /* ===== Buttons ===== */
        .deploy-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 100px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 6px 18px rgba(11,95,255,0.18);
        }
        .deploy-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(11,95,255,0.18); }

        .live-btn {
            background: #0b1220;
            color: #fff;
            text-decoration: none;
            padding: 12px 36px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 16px;
            display: inline-block;
            box-shadow: 0 8px 24px rgba(11,18,32,0.12);
        }

        /* ===== Log overlay (black render-like terminal) ===== */
        .log-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(1200px 600px at 10% 10%, rgba(10,10,10,0.98), rgba(0,0,0,0.95));
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 48px;
            font-family: 'JetBrains Mono', monospace;
            color: #7CFF9A; /* fallback */
            -webkit-font-smoothing: subpixel-antialiased;
        }

        /* subtle vignette and scanlines */
        .log-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(transparent 60%, rgba(0,0,0,0.25)),
                repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
            mix-blend-mode: overlay;
            opacity: 0.6;
        }

        /* container for log content to allow inner scrolling */
        #logContent {
            position: relative;
            z-index: 2;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(10,10,10,0.35), rgba(0,0,0,0.25));
            box-shadow: 0 20px 60px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
            overflow: auto;
            max-height: calc(100vh - 220px);
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* each log line style and animation */
        .log-line {
            margin-bottom: 10px;
            font-size: 14px;
            color: #7CFF9A;
            opacity: 0;
            transform: translateX(-18px) skewX(-2deg);
            display: inline-block;
            white-space: pre-wrap;
            line-height: 1.5;
            text-shadow:
                0 0 6px rgba(124,255,154,0.12),
                0 0 18px rgba(124,255,154,0.06);
            border-left: 2px solid rgba(124,255,154,0.06);
            padding-left: 10px;
            animation: logAppear 420ms forwards cubic-bezier(.2,.9,.2,1);
        }

        /* staggered appearance using animation-delay set inline by JS via setTimeout */
        @keyframes logAppear {
            0% { opacity: 0; transform: translateX(-24px) skewX(-4deg); filter: blur(1px); }
            60% { opacity: 1; transform: translateX(6px) skewX(0deg); filter: blur(0); }
            100% { opacity: 1; transform: translateX(0) skewX(0deg); }
        }

        /* subtle flicker/glow for the whole overlay */
        @keyframes terminalFlicker {
            0% { filter: drop-shadow(0 0 6px rgba(124,255,154,0.06)); }
            50% { filter: drop-shadow(0 0 12px rgba(124,255,154,0.12)); }
            100% { filter: drop-shadow(0 0 6px rgba(124,255,154,0.06)); }
        }
        .log-overlay { animation: terminalFlicker 3.6s ease-in-out infinite; }

        /* cursor bar effect for the last line */
        .log-line::after {
            content: "";
            display: inline-block;
            width: 8px;
            height: 14px;
            margin-left: 8px;
            background: linear-gradient(90deg, rgba(124,255,154,0.95), rgba(124,255,154,0.6));
            border-radius: 2px;
            opacity: 0;
            transform: translateY(0);
            animation: cursorPulse 1.2s steps(2, end) infinite;
        }
        @keyframes cursorPulse {
            0% { opacity: 0; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-1px); }
            100% { opacity: 0; transform: translateY(0); }
        }

        /* success box (light card) */
        .success-box {
            margin-top: 24px;
            display: none;
            text-align: center;
            z-index: 3;
        }
        .success-box h2 { color: #fff; font-size: 36px; margin-bottom: 8px; }
        .success-box p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }

        /* small responsive tweaks */
        @media (max-width: 720px) {
            h1 { font-size: 32px; }
            .container { margin: 40px 16px; }
            .log-overlay { padding: 20px; }
            #logContent { padding: 16px; max-height: calc(100vh - 160px); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><div class="logo-icon"></div> GITStand</div>
        <div id="navActions"></div>
    </nav>

    <div class="container">
        <h1>Deploy anything from GitHub.</h1>
        <div class="input-group">
            <input type="text" id="repoInput" placeholder="https://github.com/username/repository" autocomplete="off">
        </div>

        <div id="browser" class="file-browser">
            <div class="browser-header">
                <span id="repoNameDisplay">Files</span>
                <button class="deploy-btn" onclick="startDeploy()">Deploy | 展開</button>
            </div>
            <div id="fileList"></div>
        </div>
    </div>

    <div id="logOverlay" class="log-overlay">
        <div id="logContent"></div>
        <div id="successBox" class="success-box">
            <h2 style="font-size: 40px; margin-bottom: 20px;">Success!</h2>
            <p style="color: #dfffe6; margin-bottom: 40px;">Site is now live and optimized.</p>
            <a href="#" id="liveLink" class="live-btn">Open Live Site</a>
        </div>
    </div>

    <script>
        const input = document.getElementById('repoInput');
        const browser = document.getElementById('browser');
        const fileList = document.getElementById('fileList');

        input.addEventListener('input', async (e) => {
            const url = e.target.value;
            const match = url.match(/github\.com\/([^/]+)\/([^/]+)/);
            if (match) {
                const [_, user, repo] = match;
                loadRepoPreview(user, repo.replace('.git', ''));
            }
        });

        async function loadRepoPreview(user, repo) {
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
                const data = await res.json();
                if (!Array.isArray(data)) return;

                document.getElementById('repoNameDisplay').innerText = `${user} / ${repo}`;
                fileList.innerHTML = '';
                data.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `<span class="file-icon">${file.type === 'dir' ? '📁' : '📄'}</span> ${file.name}`;
                    fileList.appendChild(item);
                });
                browser.style.display = 'block';
                window.currentRepo = { user, repo, hasIndex: data.some(f => f.name === 'index.html') };
            } catch (e) { console.error(e); }
        }

        function addLog(text, delay) {
            return new Promise(res => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'log-line';
                    line.innerText = `> ${text}`;
                    document.getElementById('logContent').appendChild(line);
                    res();
                }, delay);
            });
        }

        async function startDeploy() {
            const { user, repo, hasIndex } = window.currentRepo;
            document.getElementById('logOverlay').style.display = 'flex';
            
            await addLog(`Initializing GITStand Deployment Engine...`, 500);
            await addLog(`Cloning repository: ${user}/${repo}`, 800);
            await addLog(`Analyzing directory structure...`, 600);
            await addLog(`Optimizing assets and rewriting absolute paths...`, 1000);
            await addLog(`Validating entry point...`, 500);

            if (hasIndex) {
                await addLog(`SUCCESS: index.html detected. Site is ready.`, 400);
                document.getElementById('successBox').style.display = 'block';
                document.getElementById('liveLink').href = `/${user}/${repo}/`;
            } else {
                await addLog(`INFO: index.html not found. Using Directory Listing Mode.`, 400);
                document.getElementById('successBox').style.display = 'block';
                document.getElementById('liveLink').href = `/${user}/${repo}/`;
            }
        }
    </script>
</body>
</html>
